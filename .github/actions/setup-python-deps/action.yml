name: Setup Python dependencies
description: >
  Cache pip and install dependencies for CI. Mode "build" installs the `build`
  package for PyPI packaging. Mode "docs" installs the project and Sphinx tools
  for documentation generation. Cache keys use Python major.minor (not
  pythonLocation) and hash pyproject.toml plus docs/conf.py when present.
inputs:
  mode:
    description: Use "build" for PyPI packaging deps or "docs" to install the project plus Sphinx.
    required: true
runs:
  using: composite
  steps:
    - name: Determine Python version
      id: python-version
      shell: bash
      run: |
        echo "version=$(python -c 'import sys; print("{}.{}".format(sys.version_info.major, sys.version_info.minor))')" >> "$GITHUB_OUTPUT"

    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-${{ hashFiles('pyproject.toml', 'docs/conf.py') }}-v2
        restore-keys: |
          ${{ runner.os }}-pip-${{ steps.python-version.outputs.version }}-

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ "${{ inputs.mode }}" = "build" ]; then
          python -m pip install build
        elif [ "${{ inputs.mode }}" = "docs" ]; then
          python -m pip install .
          python -m pip install sphinx sphinx-markdown-builder
        else
          echo "Unknown mode: ${{ inputs.mode }}" >&2
          exit 1
        fi
