name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  # upload-artifact and actions/cache save need Actions API write when permissions are explicit
  actions: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      # v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        # v6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.x"

      - name: Install build dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          mode: build

      - name: Build package
        run: python -m build

      - name: Store the distribution packages
        # v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vbase-api
    permissions:
      # id-token: trusted publishing to PyPI (OIDC)
      id-token: write
      # download-artifact needs Actions API read when job-level permissions are set
      actions: read

    steps:
      - name: Download all the dists
        # v6
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        # release/v1
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
