name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  # upload-artifact and actions/cache save need Actions API write when permissions are explicit
  actions: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build dependencies
        uses: ./.github/actions/setup-python-deps
        with:
          mode: build

      - name: Build package
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vbase-api
    permissions:
      # id-token: trusted publishing to PyPI (OIDC)
      id-token: write
      # download-artifact needs Actions API read when job-level permissions are set
      actions: read

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
