name: Python Dependency Locks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install lock tooling
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements/lock/tools.txt
          python-version: "3.12"
          require-hashes: "true"

      - name: Verify generated lock files are current
        run: |
          pip-compile --strip-extras --no-annotate --generate-hashes -o requirements/lock/docs.txt requirements/src/docs.in
          pip-compile --strip-extras --no-annotate --allow-unsafe --generate-hashes -o requirements/lock/tools.txt requirements/src/tools.in
          git diff --exit-code -- requirements/lock/docs.txt requirements/lock/tools.txt

      - name: Install docs dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements/lock/docs.txt
          python-version: "3.12"
          require-hashes: "true"

      - name: Build generated docs
        run: |
          set -euo pipefail
          sphinx-build -b markdown docs/ docs/_build/markdown
          sed -i 's/vbase_api\.vbase_api_client\.VBaseAPIClient/vbase_api\.VBaseAPIClient/g' docs/_build/markdown/vbase_api_client.md
          sed -i 's/vbase_api\.vbase_api_models/vbase_api/g' docs/_build/markdown/vbase_api_models.md
